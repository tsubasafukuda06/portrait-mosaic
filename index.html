<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星新一 ショートショート全集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #start-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 48px;
      z-index: 100;
    }
    #speaker { width: 80px; height: 80px; }
    #speaker .wave {
      transform-origin: 10% 50%;
      animation: pulse 1.4s ease-in-out infinite;
      opacity: 0;
    }
    #speaker .wave-1 { animation-delay: 0s; }
    #speaker .wave-2 { animation-delay: 0.22s; }
    #speaker .wave-3 { animation-delay: 0.44s; }
    @keyframes pulse {
      0%   { opacity: 0; transform: scale(0.85); }
      40%  { opacity: 1; transform: scale(1);    }
      80%  { opacity: 0; transform: scale(1.08); }
      100% { opacity: 0; transform: scale(1.08); }
    }
    #start-btn {
      font-family: monospace;
      font-size: 18px;
      color: #fff;
      background: none;
      border: 1px solid #fff;
      padding: 16px 40px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #debug {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-family: monospace;
      font-size: 15px;
      color: #fff;
      z-index: 200;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="video" playsinline muted></video>
  <div id="start-screen">
    <svg id="speaker" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 28 L10 52 L26 52 L46 68 L46 12 L26 28 Z" fill="#fff"/>
      <path class="wave wave-1" d="M54 34 Q60 40 54 46" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path class="wave wave-2" d="M62 26 Q74 40 62 54" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path class="wave wave-3" d="M70 18 Q88 40 70 62" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <button id="start-btn">カメラを起動</button>
  </div>
  <div id="debug"></div>

  <script src="p5.min.js"></script>
  <script type="module" src="ar.js"></script>
</body>
</html>
