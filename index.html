<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星新一 ショートショート全集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #start-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #start-btn {
      font-family: monospace;
      font-size: 18px;
      color: #fff;
      background: none;
      border: 1px solid #fff;
      padding: 16px 40px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <video id="video" playsinline muted></video>

  <!-- スタート画面 -->
  <div id="start-screen">
    <button id="start-btn">カメラを起動</button>
  </div>

  <!-- p5.js (オーバーレイアニメーション用) -->
  <script src="p5.min.js"></script>
  <!-- AR本体 (ES module: MindAR をCDNからimport) -->
  <script type="module" src="ar.js"></script>
</body>
</html>
