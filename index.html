<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星新一 ショートショート全集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

    #start-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 48px;
      z-index: 200;
    }
    #speaker { width: 80px; height: 80px; }
    #speaker .wave {
      transform-origin: 10% 50%;
      animation: pulse 1.4s ease-in-out infinite;
      opacity: 0;
    }
    #speaker .wave-1 { animation-delay: 0s; }
    #speaker .wave-2 { animation-delay: 0.22s; }
    #speaker .wave-3 { animation-delay: 0.44s; }
    @keyframes pulse {
      0%   { opacity: 0; transform: scale(0.85); }
      40%  { opacity: 1; transform: scale(1);    }
      80%  { opacity: 0; transform: scale(1.08); }
      100% { opacity: 0; transform: scale(1.08); }
    }
    #start-btn {
      font-family: monospace;
      font-size: 18px;
      color: #fff;
      background: none;
      border: 1px solid #fff;
      padding: 16px 40px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    a-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    #debug {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-family: monospace;
      font-size: 15px;
      color: #fff;
      z-index: 300;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- スタート画面 -->
  <div id="start-screen">
    <svg id="speaker" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 28 L10 52 L26 52 L46 68 L46 12 L26 28 Z" fill="#fff"/>
      <path class="wave wave-1" d="M54 34 Q60 40 54 46" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path class="wave wave-2" d="M62 26 Q74 40 62 54" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path class="wave wave-3" d="M70 18 Q88 40 70 62" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <button id="start-btn">カメラを起動</button>
  </div>

  <!-- A-Frame シーン -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; warmupTolerance: 0; missTolerance: 0;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      <a-plane id="face-plane"
        width="1" height="1.480"
        position="0 0 0"
        material="shader: flat; side: double; transparent: false;">
      </a-plane>
    </a-entity>
  </a-scene>

  <!-- ウィンク動画（非表示、テクスチャ用） -->
  <video id="wink-video" src="reference/wink_mosaic.mp4"
    playsinline muted preload="auto"
    style="display:none; position:absolute; pointer-events:none;">
  </video>

  <div id="debug"></div>

  <!-- ライブラリ（ローカル） -->
  <script src="aframe.min.js"></script>
  <script src="mindar-image-aframe.prod.js"></script>
  <!-- AR制御 -->
  <script src="ar.js"></script>
</body>
</html>
